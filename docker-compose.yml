version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: medallion_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medallion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medallion}
      POSTGRES_DB: ${POSTGRES_DB:-medallion}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medallion}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: